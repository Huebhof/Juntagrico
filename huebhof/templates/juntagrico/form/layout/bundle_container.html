{% load juntagrico.common %}

<div class="subscription-bundle-group mb-4">
    {% if div.show %}
        <div class="col-12 mb-4 {{ div.css_class }}">
            <h2>{{ div.name }}</h2>
            <div>{{ div.description|richtext|safe }}</div>
        </div>
    {% endif %}

    <div class="row subscription-bundle-grid">
        {{ fields|safe }}
    </div>
</div>
